spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  cache:
    type: redis
  redis:
    host: localhost
    port: 6379

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create-drop
    show_sql: false
    properties:
      hibernate:
        format_sql: false
        show_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: OFF
      root: info
    file:
      path: logs
      name: myapp.log

  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:thisIsASecretKeyForDevelopmentOnlyMustBe32Chars}